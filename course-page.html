<!DOCTYPE html>
<html>
<head>
<title>Course Page</title>
<style>
body { font-family: Arial; margin: 20px; }
.module { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; }
button { padding: 8px 12px; margin-top: 10px; }
.hidden { display: none; }
</style>
</head>

<body>

<h1>Christian Wedding Officiant Certification</h1>

<p><strong>Rules:</strong></p>
<ul>
<li>You must complete each module in order</li>
<li>You must score 80% or higher to pass</li>
<li>You get 2 attempts per quiz</li>
<li>Fail twice = locked</li>
</ul>

<div id="course"></div>

<h2 id="final" class="hidden">🎉 Course Complete – Certificate Unlocked</h2>

<script>
let progress = JSON.parse(localStorage.getItem("progress")) || {};
let attempts = JSON.parse(localStorage.getItem("attempts")) || {};

function save() {
  localStorage.setItem("progress", JSON.stringify(progress));
  localStorage.setItem("attempts", JSON.stringify(attempts));
}

function createModule(num) {
  let div = document.createElement("div");
  div.className = "module";

  let unlocked = num === 1 || progress["module" + (num - 1)] === true;

  div.innerHTML = `
    <h3>Module ${num}</h3>
    <p>Study content for module ${num} (read before unlocking test).</p>
    <button onclick="unlock(${num})" ${!unlocked ? "disabled" : ""}>Unlock Quiz</button>
    <div id="quiz${num}" class="hidden"></div>
  `;

  return div;
}

function unlock(num) {
  let quizDiv = document.getElementById("quiz" + num);
  quizDiv.classList.remove("hidden");
  renderQuiz(num);
}

function renderQuiz(num) {
  let quizDiv = document.getElementById("quiz" + num);

  if (progress["module" + num]) {
    quizDiv.innerHTML = "<p>✅ Passed</p>";
    return;
  }

  if ((attempts["module" + num] || 0) >= 2) {
    quizDiv.innerHTML = "<p>❌ Locked (failed twice)</p>";
    return;
  }

  quizDiv.innerHTML = `
    <p>Quiz ${num}</p>
    <p>Question: What is the purpose of this module?</p>
    <input type="radio" name="q${num}" value="0"> Random guess<br>
    <input type="radio" name="q${num}" value="1"> Correct understanding<br>
    <br>
    <button onclick="submitQuiz(${num})">Submit</button>
  `;
}

function submitQuiz(num) {
  let selected = document.querySelector('input[name="q' + num + '"]:checked');

  if (!selected) {
    alert("Select an answer");
    return;
  }

  attempts["module" + num] = (attempts["module" + num] || 0) + 1;

  if (selected.value == "1") {
    progress["module" + num] = true;
    alert("Passed");
  } else {
    alert("Failed");
  }

  save();
  location.reload();
}

function checkFinal() {
  for (let i = 1; i <= 10; i++) {
    if (!progress["module" + i]) return;
  }
  document.getElementById("final").classList.remove("hidden");
}

let course = document.getElementById("course");

for (let i = 1; i <= 10; i++) {
  course.appendChild(createModule(i));
}

checkFinal();
</script>

</body>
</html>
